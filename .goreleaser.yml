version: 2

builds:
  - main: ./cmd/cq
    binary: cq
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    include:
      - "^feat"
      - "^fix"
      - "^perf"
      - "^refactor"

brews:
  - repository:
      owner: jacobcxdev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: cq
    homepage: "https://github.com/jacobcxdev/cq"
    description: "CLI tool to check AI provider quota usage"
    license: "MIT"
    dependencies:
      - name: python@3
    install: |
      bin.install "cq"
    post_install: |
      system Formula["python@3"].opt_bin/"python3", "-m", "pip", "install", "--break-system-packages", "--quiet", "headroom-ai[all]"
    service: |
      run [opt_bin/"cq", "proxy", "start"]
      keep_alive true
      log_path File.expand_path("~/Library/Logs/cq/proxy.log")
      error_log_path File.expand_path("~/Library/Logs/cq/proxy.log")
      working_dir Dir.home
    test: |
      system "#{bin}/cq", "--help"

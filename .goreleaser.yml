version: 2

builds:
  - main: ./cmd/cq
    binary: cq
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    include:
      - "^feat"
      - "^fix"
      - "^perf"
      - "^refactor"

brews:
  - repository:
      owner: jacobcxdev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: cq
    homepage: "https://github.com/jacobcxdev/cq"
    description: "CLI tool to check AI provider quota usage"
    license: "MIT"
    install: |
      bin.install "cq"
    test: |
      system "#{bin}/cq", "--help"
